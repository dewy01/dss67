services:
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:80"
